name: Build & Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Linux AppImage ────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxdo-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Assemble & build AppImage
        run: |
          # Download appimagetool (use extract-and-run to avoid needing FUSE)
          curl -fsSL \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -o appimagetool
          chmod +x appimagetool

          # AppDir structure
          mkdir -p AppDir/usr/bin
          cp target/release/awesome-clicker AppDir/usr/bin/awesome-clicker
          cp assets/icon.svg AppDir/awesome-clicker.svg

          cat > AppDir/awesome-clicker.desktop <<'EOF'
          [Desktop Entry]
          Name=AwesomeClicker
          Comment=Cross-platform auto clicker
          Exec=awesome-clicker
          Icon=awesome-clicker
          Terminal=false
          Type=Application
          Categories=Utility;
          Keywords=clicker;auto;mouse;
          EOF

          cat > AppDir/AppRun <<'EOF'
          #!/usr/bin/env bash
          SELF=$(readlink -f "$0")
          HERE="${SELF%/*}"
          exec "${HERE}/usr/bin/awesome-clicker" "$@"
          EOF
          chmod +x AppDir/AppRun

          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool AppDir AwesomeClicker-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v5
        with:
          name: linux-appimage
          path: AwesomeClicker-x86_64.AppImage

  # ── Windows .exe ──────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Rename for release
        shell: bash
        run: mv target/release/awesome-clicker.exe AwesomeClicker-Windows-x86_64.exe

      - name: Upload exe artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-exe
          path: AwesomeClicker-Windows-x86_64.exe

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v5
        with:
          name: linux-appimage

      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: windows-exe

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            AwesomeClicker-x86_64.AppImage
            AwesomeClicker-Windows-x86_64.exe
